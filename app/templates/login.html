<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — Aprolabs</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center">
  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Aprolabs</h1>
      <p class="text-sm text-gray-500 mt-1">수능 국어 파이프라인</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
      <form method="post" action="/login" class="space-y-5">
        <input type="hidden" name="next" value="{{ next }}">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">이메일</label>
          <input type="email" name="email" required autofocus
                 placeholder="admin@aprolabs.co.kr"
                 class="w-full px-3.5 py-2.5 border border-gray-300 rounded-lg text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">비밀번호</label>
          <input type="password" name="password" required
                 class="w-full px-3.5 py-2.5 border border-gray-300 rounded-lg text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>

        {% if error %}
        <div class="text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3.5 py-2.5">
          {{ error }}
        </div>
        {% endif %}

        <button type="submit"
                class="w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-700 text-white text-sm
                       font-semibold rounded-lg transition-colors">
          로그인
        </button>
      </form>
    </div>

  </div>
</body>
</html>
