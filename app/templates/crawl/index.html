{% extends "base.html" %}
{% block title %}기출문제 크롤링 - Aprolabs{% endblock %}

{% block content %}
<div class="mb-6">
  <h2 class="text-2xl font-bold text-gray-800">기출문제 크롤링</h2>
  <p class="text-sm text-gray-400 mt-1">레전드스터디에서 수능·모의고사 국어 기출 PDF를 수집합니다.</p>
</div>

{# ── 검색 필터 ── #}
<div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5 mb-5">
  <div class="flex flex-wrap gap-4 items-end">
    <div class="w-full">
      <div class="flex items-center gap-2 mb-1">
        <label class="text-xs font-semibold text-gray-500">페이지 URL</label>
        <span class="text-xs text-gray-400">(비우면 기본 카테고리 스캔 · 최대 20개)</span>
        <button onclick="addUrlRow()" id="btn-add-url"
                class="ml-1 text-xs px-2 py-0.5 rounded bg-blue-50 text-blue-600 hover:bg-blue-100 border border-blue-200 transition">
          + URL 추가
        </button>
      </div>
      <div id="url-list" class="flex flex-col gap-1.5">
        <div class="url-row flex items-center gap-1.5">
          <input type="text" placeholder="예: https://legendstudy.com/1700"
                 class="url-inp border border-gray-200 rounded-lg px-3 py-2 text-sm w-80 focus:outline-none focus:ring-2 focus:ring-blue-400">
          <button onclick="removeUrlRow(this)" class="text-gray-300 hover:text-red-400 text-lg leading-none hidden">✕</button>
        </div>
      </div>
    </div>

    <div>
      <label class="block text-xs font-semibold text-gray-500 mb-1">학년도</label>
      <select id="sel-year" onchange="applyFilters()"
              class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        <option value="">전체</option>
        {% for y in years %}
        <option value="{{ y }}">{{ y }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-xs font-semibold text-gray-500 mb-1">학년</label>
      <select id="sel-grade" onchange="applyFilters()"
              class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        <option value="">전체</option>
        <option value="고1">고1</option>
        <option value="고2">고2</option>
        <option value="고3">고3</option>
      </select>
    </div>

    <div>
      <label class="block text-xs font-semibold text-gray-500 mb-1">과목</label>
      <select id="sel-subj"
              class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        <option value="">전체</option>
        <option value="국어" selected>국어</option>
        <option value="영어">영어</option>
        <option value="수학">수학</option>
        <option value="한국사">한국사</option>
        <option value="사회">사회탐구</option>
        <option value="과학">과학탐구</option>
      </select>
    </div>

    <div>
      <label class="block text-xs font-semibold text-gray-500 mb-1">파일 종류</label>
      <select id="sel-filetype"
              class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        <option value="" selected>전체</option>
        <option value="문제">문제</option>
        <option value="정답해설">정답·해설</option>
      </select>
    </div>

    <div>
      <label class="block text-xs font-semibold text-gray-500 mb-1">스캔 범위</label>
      <select id="sel-pages"
              class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        <option value="2">최근 2페이지</option>
        <option value="4">최근 4페이지</option>
        <option value="6">최근 6페이지</option>
        <option value="10">최근 10페이지</option>
        <option value="20" selected>전체 (20페이지)</option>
      </select>
    </div>

    <button onclick="doSearch()"
            class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-lg transition">
      PDF 검색
    </button>
  </div>
</div>

{# ── 파일 목록 ── #}
<div id="files-area" class="hidden">
  <div class="flex items-center justify-between mb-3">
    <div>
      <span class="text-sm font-semibold text-gray-700">국어 PDF <span id="files-count" class="text-blue-600">0</span>건</span>
      <button onclick="toggleAll(true)"  class="ml-3 text-xs text-blue-500 hover:underline">전체 선택</button>
      <button onclick="toggleAll(false)" class="ml-1 text-xs text-gray-400 hover:underline">전체 해제</button>
      <button onclick="selectOnly('문제')" class="ml-1 text-xs text-green-600 hover:underline">문제만</button>
    </div>
    <button onclick="doImport()"
            class="px-5 py-2 bg-green-600 hover:bg-green-700 text-white text-sm font-semibold rounded-lg transition">
      선택 파일 다운로드 →
    </button>
  </div>
  <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
    <table class="w-full text-sm">
      <thead>
        <tr class="bg-gray-50 border-b border-gray-100 text-xs text-gray-500 font-semibold">
          <th class="py-3 px-4 w-8">
            <input type="checkbox" id="chk-all" onchange="toggleAll(this.checked)" class="rounded">
          </th>
          <th class="py-3 px-4 text-left">파일명</th>
          <th class="py-3 px-4 text-left w-20">학년도</th>
          <th class="py-3 px-4 text-left w-12">학년</th>
          <th class="py-3 px-4 text-left w-32">시험</th>
          <th class="py-3 px-4 text-left w-32">선택과목</th>
          <th class="py-3 px-4 text-left w-20">종류</th>
        </tr>
      </thead>
      <tbody id="files-tbody"></tbody>
    </table>
  </div>
</div>

<div id="loading-msg" class="hidden text-center py-16 text-gray-400 text-sm">
  <div class="animate-pulse text-2xl mb-3">⏳</div>
  <span id="loading-text">PDF 목록 수집 중... (잠시 기다려주세요)</span>
</div>
<div id="empty-msg" class="hidden text-center py-16 text-gray-400 text-sm">
  <div class="text-4xl mb-3">📭</div>검색 결과가 없습니다.
</div>

<div id="toast"
     style="display:none;position:fixed;bottom:24px;right:24px;z-index:999;
            background:#1e293b;color:white;padding:12px 20px;border-radius:10px;
            font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,0.3);">
</div>

<script>
let allFiles = [];

function getUrls() {
  return Array.from(document.querySelectorAll('.url-inp'))
    .map(el => el.value.trim()).filter(Boolean);
}

function addUrlRow() {
  const list = document.getElementById('url-list');
  if (list.children.length >= 20) { showToast('URL은 최대 20개까지 입력할 수 있습니다.', 3000); return; }
  const row = document.createElement('div');
  row.className = 'url-row flex items-center gap-1.5';
  row.innerHTML = `
    <input type="text" placeholder="예: https://legendstudy.com/1700"
           class="url-inp border border-gray-200 rounded-lg px-3 py-2 text-sm w-80 focus:outline-none focus:ring-2 focus:ring-blue-400">
    <button onclick="removeUrlRow(this)" class="text-gray-300 hover:text-red-400 text-lg leading-none">✕</button>`;
  list.appendChild(row);
  _syncRemoveButtons();
  row.querySelector('input').focus();
}

function removeUrlRow(btn) {
  const list = document.getElementById('url-list');
  if (list.children.length <= 1) { btn.closest('.url-row').querySelector('input').value = ''; return; }
  btn.closest('.url-row').remove();
  _syncRemoveButtons();
}

function _syncRemoveButtons() {
  const rows = document.querySelectorAll('.url-row');
  rows.forEach((row, i) => {
    const btn = row.querySelector('button');
    if (btn) btn.classList.toggle('hidden', rows.length === 1 && i === 0);
  });
}

async function doSearch() {
  const year     = document.getElementById('sel-year').value;
  const subject  = document.getElementById('sel-subj').value;
  const filetype = document.getElementById('sel-filetype').value;
  const pages    = document.getElementById('sel-pages').value;
  const source_urls = getUrls();

  document.getElementById('files-area').classList.add('hidden');
  document.getElementById('empty-msg').classList.add('hidden');
  document.getElementById('loading-msg').classList.remove('hidden');

  try {
    const res = await fetch('/crawl/search', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({year, subject, filetype, pages: parseInt(pages), source_urls}),
    });
    const data = await res.json();
    document.getElementById('loading-msg').classList.add('hidden');

    if (!data.ok) { alert('오류: ' + (data.error || '알 수 없는 오류')); return; }

    allFiles = data.files || [];
    applyFilters();
  } catch(e) {
    document.getElementById('loading-msg').classList.add('hidden');
    alert('요청 실패: ' + e);
  }
}

function applyFilters() {
  const grade = document.getElementById('sel-grade').value;
  const year  = document.getElementById('sel-year').value;
  let filtered = allFiles;
  if (year)  filtered = filtered.filter(f => String(f.academic_year) === String(year));
  if (grade) filtered = filtered.filter(f => f.grade === grade);
  renderFiles(filtered);
}

function renderFiles(list) {
  const tbody = document.getElementById('files-tbody');
  tbody.innerHTML = '';

  if (!list.length) {
    document.getElementById('empty-msg').classList.remove('hidden');
    return;
  }

  list.forEach((f, i) => {
    const origIdx = allFiles.indexOf(f);  // filtered 순번이 아닌 allFiles 원본 인덱스
    const isAnswer = f.file_type === '정답해설';
    const isDup    = !!f.is_duplicate;
    const isComb   = !!f.is_combined;
    const tr = document.createElement('tr');
    let rowClass = 'border-b border-gray-50 transition';
    if (isDup)      rowClass += ' bg-gray-100 opacity-60';
    else if (isAnswer) rowClass += ' opacity-55 hover:bg-gray-50';
    else            rowClass += ' hover:bg-gray-50';
    tr.className = rowClass;
    tr.dataset.filetype = f.file_type;

    const dupBadge  = isDup  ? '<span class="ml-1 text-xs px-1.5 py-0.5 rounded-full bg-gray-200 text-gray-500 font-medium">이미 수집</span>' : '';
    const combBadge = isComb ? '<span class="ml-1 text-xs px-1.5 py-0.5 rounded-full bg-orange-100 text-orange-600 font-medium">합본</span>' : '';

    tr.innerHTML = `
      <td class="py-2.5 px-4">
        <input type="checkbox" class="file-chk rounded" data-idx="${origIdx}"
               ${isDup ? 'disabled' : (isAnswer ? '' : 'checked')}>
      </td>
      <td class="py-2.5 px-4 text-xs text-gray-700">
        ${escHtml(f.filename)}${dupBadge}${combBadge}
      </td>
      <td class="py-2.5 px-4 text-gray-500 font-mono text-xs">${f.academic_year ? f.academic_year + '학년도' : '-'}</td>
      <td class="py-2.5 px-4 text-gray-500 text-xs">${escHtml(f.grade) || '-'}</td>
      <td class="py-2.5 px-4 text-gray-500 text-xs">${escHtml(f.exam_type) || '-'}</td>
      <td class="py-2.5 px-4">
        <span class="text-xs px-1.5 py-0.5 rounded-full bg-blue-50 text-blue-700 font-medium whitespace-nowrap">${escHtml(f.sub_type) || '-'}</span>
      </td>
      <td class="py-2.5 px-4">
        <span class="text-xs font-semibold ${isAnswer ? 'text-gray-400' : 'text-green-600'}">${f.file_type}</span>
      </td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('files-count').textContent = list.length;
  document.getElementById('files-area').classList.remove('hidden');
}

function toggleAll(checked) {
  document.querySelectorAll('.file-chk').forEach(c => c.checked = checked);
  document.getElementById('chk-all').checked = checked;
}

function selectOnly(filetype) {
  document.querySelectorAll('.file-chk').forEach(c => {
    const tr = c.closest('tr');
    c.checked = tr && tr.dataset.filetype === filetype;
  });
}

async function doImport() {
  const selected = [];
  document.querySelectorAll('.file-chk:checked').forEach(c => {
    const idx = parseInt(c.dataset.idx);
    if (allFiles[idx]) selected.push(allFiles[idx]);
  });

  if (!selected.length) { alert('다운로드할 파일을 선택하세요.'); return; }

  showToast(`⏳ ${selected.length}개 PDF 다운로드 중...`, 0);

  try {
    const res = await fetch('/crawl/import', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({files: selected}),
    });
    const data = await res.json();
    const ok   = (data.created || []).filter(c => c.ok).length;
    const fail = (data.created || []).filter(c => !c.ok).length;

    if (fail) showToast(`⚠ ${ok}개 성공, ${fail}개 실패`, 5000);
    else      showToast(`✅ ${ok}개 다운로드 완료 → 작업 목록으로 이동`, 3000);

    if (ok > 0) setTimeout(() => { window.location.href = '/suneung/jobs'; }, 1500);
  } catch(e) {
    showToast('요청 실패: ' + e, 4000);
  }
}

let _tt = null;
function showToast(msg, ms) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(_tt);
  if (ms > 0) _tt = setTimeout(() => t.style.display = 'none', ms);
}
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
{% endblock %}
